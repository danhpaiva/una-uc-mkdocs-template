site_name: "Sua Disciplina - UNA"
# Troque para a URL do seu Pages: https://SEU_USUARIO.github.io/SEU_REPOSITORIO/
site_url: https://SEU_USUARIO.github.io/SEU_REPOSITORIO/
site_author: Seu Nome

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.sections
    - navigation.expand # Deixa o menu lateral aberto por padrão
    - navigation.top # Botão "Voltar ao topo" automático
    - navigation.tracking # Atualiza a URL conforme o aluno rola a página
    - content.code.copy # Botão de copiar código em um clique

nav:
  - Home: index.md
  - Guia do Professor: setup.md
  - 📖 Aulas:
      - Introdução: aulas/01-introducao.md
  - 📝 Atividades:
      - Projeto 01: trabalhos/projeto-01.md

plugins:
  - search
  - git-revision-date-localized

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
# Para habilitar estatísticas, crie um ID no Google Analytics e preencha abaixo:
